const MO_2026=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_2027=['Jan','Feb','Mar','Apr','May','Jun'];
function log(msg,cls=''){const el=document.getElementById('log');el.innerHTML+=`<div class="${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight;}
function prog(msg){document.getElementById('progress').textContent=msg;}
async function clearAll(){
  if(!confirm('Delete ALL athletes? Cannot be undone.')) return;
  prog('Clearing...');
  const {error}=await sb.from('athletes').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(error){log('Error: '+error.message,'err');return;}
  log('All athletes cleared','ok');prog('Cleared.');
}
async function startImport(){
  document.getElementById('btn-import').disabled=true;
  prog('Checking existing athletes...');
  const {data:existing,error:ee}=await sb.from('athletes').select('first_name,last_name');
  if(ee){log('Auth error — are you logged in? '+ee.message,'err');document.getElementById('btn-import').disabled=false;return;}
  const existingSet=new Set((existing||[]).map(a=>a.first_name.trim().toLowerCase()+'_'+a.last_name.trim().toLowerCase()));
  log(`DB has ${existingSet.size} athletes. Importing ${ATHLETES.length}...`,'info2');
  log('─'.repeat(50));
  let inserted=0,skipped=0,errors=0;
  for(let i=0;i<ATHLETES.length;i++){
    const a=ATHLETES[i];
    prog(`${i+1}/${ATHLETES.length}: ${a.fname} ${a.lname}`);
    const key=a.fname.trim().toLowerCase()+'_'+a.lname.trim().toLowerCase();
    if(existingSet.has(key)){log(`SKIP  ${a.fname} ${a.lname}`,'warn');skipped++;continue;}
    const {data:newA,error:ae}=await sb.from('athletes').insert({
      first_name:a.fname.trim(),last_name:a.lname.trim(),position:a.pos,
      sport:a.sport||'Football',rank_priority:a.rank,
      contract:a.contract||0,banked:a.banked||0,paid_out:a.paid_out||0,
      rs_contract:0,rs_paid:0,active:true,deals:[]
    }).select().single();
    if(ae){log(`ERROR ${a.fname} ${a.lname}: ${ae.message}`,'err');errors++;continue;}
    const schedRows=MO_2026.map((mo,idx)=>({
      athlete_id:newA.id,month:mo,year:2026,amount:a.nil_2026[idx]||0,
      is_paid:false,sources:[],nil_cleared:0,shortfall:0,rs_paid:false
    }));
    a.nil_2027.forEach((amt,idx)=>{if(amt>0) schedRows.push({athlete_id:newA.id,month:MO_2027[idx],year:2027,amount:amt,is_paid:false,sources:[],nil_cleared:0,shortfall:0,rs_paid:false});});
    const {error:se}=await sb.from('payment_schedule').insert(schedRows);
    if(se) log(`  ⚠ Schedule: ${se.message}`,'err');
    log(`✓ ${a.fname} ${a.lname} (${a.pos}) $${(a.contract||0).toLocaleString()}`,'ok');
    inserted++;
    await new Promise(r=>setTimeout(r,60));
  }
  prog(`Done! ${inserted} inserted · ${skipped} skipped · ${errors} errors`);
  log('─'.repeat(50));
  log(`COMPLETE: ${inserted} inserted, ${skipped} skipped, ${errors} errors`,'ok');
  document.getElementById('btn-import').disabled=false;
}
