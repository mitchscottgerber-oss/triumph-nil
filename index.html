<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triumph NIL</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231d1d1f'/><text y='.9em' font-size='80' x='10' fill='white'>T</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center}
#login-wrap{width:100%;max-width:400px;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 4px 40px rgba(0,0,0,.1)}
.login-logo{width:52px;height:52px;border-radius:14px;background:#1d1d1f;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin:0 auto 20px}
.login-title{font-size:22px;font-weight:700;color:#1d1d1f;text-align:center;letter-spacing:-.4px;margin-bottom:4px}
.login-sub{font-size:13px;color:#8e8e93;text-align:center;margin-bottom:32px}
.login-label{font-size:11px;font-weight:600;color:#6c6c70;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.login-input{width:100%;height:44px;padding:0 14px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;font-family:inherit;color:#1d1d1f;background:#f9f9f9;outline:none;margin-bottom:14px}
.login-input:focus{border-color:#1d1d1f;background:#fff}
.login-btn{width:100%;height:44px;background:#1d1d1f;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s}
.login-btn:hover{background:#333}
.login-btn:disabled{background:#aeaeb2;cursor:not-allowed}
.login-err{background:#fff0f3;border:1.5px solid #f5c6d0;border-radius:8px;padding:10px 14px;font-size:12px;color:#e34040;margin-bottom:14px;display:none}
.login-forgot{text-align:center;margin-top:16px;font-size:12px;color:#8e8e93}
.login-forgot a{color:#1d1d1f;font-weight:600;text-decoration:none}
.login-forgot a:hover{text-decoration:underline}
.reset-msg{background:#e8f8f2;border:1.5px solid #9fe1cb;border-radius:8px;padding:10px 14px;font-size:12px;color:#1d9e75;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">T</div>
    <div class="login-title">Triumph NIL</div>
    <div class="login-sub">Virginia Tech Athletics</div>
    <div class="login-err" id="login-err"></div>
    <div class="reset-msg" id="reset-msg">Password reset email sent. Check your inbox.</div>
    <label class="login-label">Email</label>
    <input class="login-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
    <label class="login-label">Password</label>
    <input class="login-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-forgot"><a href="#" onclick="doReset();return false">Forgot password?</a></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lokizzpfuylrfeblrphh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_w1ulFSnvGJETlXhnGtL4cw_rJDnUAQp';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    window.location.href = '/triumph_v9.html';
  }
}
init();

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');

  err.style.display = 'none';
  if (!email || !pass) {
    err.textContent = 'Please enter your email and password.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    err.textContent = 'Incorrect email or password.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }

  window.location.href = '/triumph_v9.html';
}

async function doReset() {
  const email = document.getElementById('login-email').value.trim();
  const err = document.getElementById('login-err');
  const msg = document.getElementById('reset-msg');
  err.style.display = 'none';

  if (!email) {
    err.textContent = 'Enter your email address above first.';
    err.style.display = 'block';
    return;
  }

  await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/triumph_v9.html'
  });

  msg.style.display = 'block';
}
</script>
</body>
</html>
